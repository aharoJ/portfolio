services:
  portfolio:
    image: ghcr.io/aharoj/portfolio:${VERSION:-latest}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=280"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 320M
    networks:
      proxy:
        aliases:
          - portfolio
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy:
    external: true
